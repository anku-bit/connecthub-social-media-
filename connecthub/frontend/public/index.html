<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectHub — Social Media</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --p:#6c63ff;--p2:#574fd6;--pg:rgba(108,99,255,.1);
  --bg:#f0f2f5;--surface:#fff;--border:#e4e6eb;
  --text:#1c1e21;--muted:#65676b;--muted2:#b0b3b8;
  --green:#31a24c;--red:#f3425f;--yellow:#f7b731;
  --r:12px;--rs:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.05);
  --shadow-lg:0 4px 20px rgba(0,0,0,.12);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#c4c4c4;border-radius:10px}
img{display:block}
.hidden{display:none!important}
a{text-decoration:none;color:inherit}
/* UTILITIES */
.flex{display:flex}.ic{align-items:center}.jb{justify-content:space-between}.jc{justify-content:center}
.g1{gap:4px}.g2{gap:8px}.g3{gap:12px}.g4{gap:16px}.g6{gap:24px}
.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}
.f1{flex:1}.fw{flex-wrap:wrap}.fcol{flex-direction:column}
.sm{font-size:13px}.xs{font-size:11px}.lg{font-size:17px}
.muted{color:var(--muted)}.muted2{color:var(--muted2)}.accent{color:var(--p)}
.bold{font-weight:700}.semi{font-weight:600}.med{font-weight:500}
.center{text-align:center}.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* BUTTON */
.btn{padding:8px 18px;border-radius:var(--rs);border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;transition:all .18s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-p{background:var(--p);color:#fff;box-shadow:0 2px 6px rgba(108,99,255,.3)}.btn-p:hover{background:var(--p2);transform:translateY(-1px)}
.btn-o{background:transparent;color:var(--p);border:1.5px solid var(--p)}.btn-o:hover{background:var(--pg)}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{background:#27902f}
.btn-r{background:var(--red);color:#fff}.btn-r:hover{background:#d9273e}
.btn-gray{background:#e4e6eb;color:var(--text)}.btn-gray:hover{background:#d8dadf}
.btn-sm{padding:5px 13px;font-size:12px;border-radius:6px}
.btn-fw{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
/* INPUTS */
.inp{border:1.5px solid var(--border);border-radius:var(--rs);padding:9px 13px;font-family:inherit;font-size:14px;width:100%;outline:none;transition:border-color .2s;background:#fff;color:var(--text)}
.inp:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(108,99,255,.1)}
.inp::placeholder{color:var(--muted2)}
.inp-bg{background:#f0f2f5;border-color:transparent}.inp-bg:focus{background:#fff;border-color:var(--p)}
textarea.inp{resize:vertical;min-height:80px;line-height:1.6}
/* CARD */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
/* NAVBAR */
.navbar{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.1);position:sticky;top:0;z-index:300;height:56px}
.navbar-inner{max-width:1200px;margin:0 auto;height:100%;display:flex;align-items:center;gap:10px;padding:0 16px}
.logo{font-size:20px;font-weight:800;color:var(--p);cursor:pointer;display:flex;align-items:center;gap:6px;flex-shrink:0}
.logo-mark{width:30px;height:30px;background:var(--p);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
.nav-search-wrap{flex:1;max-width:300px;position:relative}
.nav-search-wrap input{padding-left:34px;border-radius:20px}
.nav-si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
.sdrop{position:absolute;top:calc(100%+6px);left:0;right:0;background:#fff;border-radius:var(--r);box-shadow:var(--shadow-lg);z-index:400;border:1px solid var(--border);overflow:hidden}
.sitem{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);font-size:13px}.sitem:last-child{border-bottom:none}.sitem:hover{background:var(--bg)}
.nav-tabs{flex:1;display:flex;justify-content:center;gap:4px}
.nav-tab{padding:7px 18px;border-radius:var(--rs);border:none;background:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);font-family:inherit;transition:all .15s}.nav-tab:hover{background:var(--bg);color:var(--text)}.nav-tab.active{background:var(--p);color:#fff}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{background:var(--bg);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s;position:relative}.icon-btn:hover{background:var(--border)}
.notif-dot{position:absolute;top:1px;right:1px;width:11px;height:11px;border-radius:50%;background:var(--red);border:2px solid #fff}
/* AVATAR */
.av{border-radius:50%;flex-shrink:0;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;cursor:pointer;overflow:hidden}
/* LAYOUT */
.app-layout{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:240px 1fr 290px;gap:18px;padding:18px 16px;align-items:start}
/* LEFT SIDEBAR */
.left-sidebar{position:sticky;top:72px}
.sidebar-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:12px;margin-bottom:12px}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--rs);cursor:pointer;margin-bottom:8px}.sidebar-user:hover{background:var(--bg)}
.nav-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rs);cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;color:var(--text);border:none;background:none;width:100%;font-family:inherit}.nav-link:hover{background:var(--bg);color:var(--p)}.nav-link.active{background:var(--pg);color:var(--p);font-weight:700}
.nav-link-icon{font-size:16px;width:20px;text-align:center}
/* RIGHT SIDEBAR */
.right-sidebar{position:sticky;top:72px}
.trend-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.trend-title{font-size:15px;font-weight:800;margin-bottom:12px}
.trend-item{padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}.trend-item:last-child{border-bottom:none}.trend-item:hover .htag{color:var(--p2)}
.htag{font-size:14px;font-weight:700;color:var(--p)}
.trend-count{font-size:12px;color:var(--muted);margin-top:2px}
.suggest-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}.suggest-item:last-child{border-bottom:none}
/* POSTS */
.post-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;transition:box-shadow .2s}.post-card:hover{box-shadow:var(--shadow-lg)}
.post-header{display:flex;align-items:flex-start;gap:10px;padding:14px 16px 8px}
.post-meta{flex:1;min-width:0}
.post-author{font-size:14px;font-weight:700;cursor:pointer}.post-author:hover{text-decoration:underline}
.post-time{font-size:12px;color:var(--muted);margin-top:1px}
.post-body{padding:0 16px 10px;font-size:15px;line-height:1.65;color:var(--text);word-break:break-word}
.post-hashtag{color:var(--p);font-weight:600;cursor:pointer}.post-hashtag:hover{text-decoration:underline}
.post-img-wrap{overflow:hidden;max-height:500px}.post-img{width:100%;object-fit:cover;cursor:pointer;transition:transform .2s}.post-img:hover{transform:scale(1.01)}
.post-stats{display:flex;justify-content:space-between;padding:7px 16px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-size:13px;color:var(--muted)}
.post-stat-link{cursor:pointer}.post-stat-link:hover{text-decoration:underline}
.post-actions{display:flex;padding:3px 8px}
.pabtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:7px;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;font-family:inherit;transition:all .15s}.pabtn:hover{background:var(--bg);color:var(--p)}.pabtn.liked{color:var(--red)}.pabtn.saved{color:var(--p)}
/* CREATE POST */
.create-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:14px}
.create-input{width:100%;border:none;background:var(--bg);border-radius:20px;padding:10px 16px;font-size:15px;font-family:inherit;outline:none;cursor:text;resize:none;transition:all .2s;line-height:1.5;color:var(--text)}.create-input:focus{background:#fff;border:1.5px solid var(--p);border-radius:var(--rs);padding:10px 14px}
.create-actions{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
/* COMMENT */
.comment-row{display:flex;gap:8px;padding:5px 0}
.comment-bubble{background:var(--bg);border-radius:0 var(--r) var(--r) var(--r);padding:8px 12px;flex:1}
.comment-name{font-size:13px;font-weight:700;margin-bottom:2px}
.comment-text{font-size:14px;color:var(--text)}
.comment-meta{display:flex;gap:12px;margin-top:3px;padding-left:4px;font-size:11px;color:var(--muted)}
.comment-meta span{cursor:pointer}.comment-meta span:hover{color:var(--red)}
/* PROFILE */
.profile-cover{height:200px;background:linear-gradient(135deg,var(--p),#a78bfa);border-radius:var(--r) var(--r) 0 0;position:relative}
.profile-av-wrap{position:absolute;bottom:-40px;left:22px}
.profile-av{width:84px;height:84px;font-size:32px;border:4px solid #fff}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:mIn .22s ease}
@keyframes mIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:17px;font-weight:800}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:2px}.modal-close:hover{color:var(--text)}
.modal-body{padding:18px 20px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px}
/* AUTH TABS */
.auth-tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--rs);padding:4px;margin-bottom:16px}
.auth-tab{flex:1;text-align:center;padding:7px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s}.auth-tab.active{background:#fff;color:var(--p);box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:#1c1e21;color:#fff;border-radius:var(--r);padding:12px 18px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);max-width:320px;display:flex;align-items:center;gap:9px}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:#155724;border-left:3px solid var(--green)}
#toast.error{background:#721c24;border-left:3px solid var(--red)}
#toast.info{background:#1e3a5f;border-left:3px solid var(--p)}
/* SPIN */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .65s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loader{text-align:center;padding:50px;color:var(--muted);font-size:14px}
/* VERIFIED BADGE */
.verified{color:#1877f2;font-size:12px}
/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state .ei{font-size:52px;margin-bottom:12px}
/* NOTIFICATIONS */
.notif-item{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}.notif-item:last-child{border-bottom:none}
.notif-unread{background:rgba(108,99,255,.04);border-radius:var(--rs);padding:10px}.notif-dot-sm{width:8px;height:8px;border-radius:50%;background:var(--p);flex-shrink:0;margin-top:6px}
/* ERR BOX */
.err-box{background:#fde8e8;border:1px solid #fca5a5;border-radius:var(--rs);padding:9px 12px;color:var(--red);font-size:13px;font-weight:500;margin-bottom:10px}
/* IMAGE PREVIEW */
.img-preview-wrap{position:relative;margin-top:10px;border-radius:var(--rs);overflow:hidden;max-height:220px}.img-preview-wrap img{width:100%;object-fit:cover;max-height:220px}
.remove-img{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
/* GRID POSTS */
.post-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.post-grid-item{aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative;background:var(--bg)}.post-grid-item:hover .pgi-overlay{opacity:1}
.pgi-img{width:100%;height:100%;object-fit:cover}
.pgi-text{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:8px;font-size:12px;color:var(--muted);text-align:center;line-height:1.4;overflow:hidden}
.pgi-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;gap:12px;color:#fff;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s}
/* RESPONSIVE */
@media(max-width:1000px){.app-layout{grid-template-columns:1fr}.left-sidebar,.right-sidebar{display:none}}
@media(max-width:600px){.navbar-inner{padding:0 10px}.nav-tabs{display:none}.app-layout{padding:10px}}
</style>
</head>
<body>

<!-- ═══ NAVBAR ═══ -->
<nav class="navbar">
  <div class="navbar-inner">
    <div class="logo" onclick="goPage('explore')">
      <div class="logo-mark">C</div>
      ConnectHub
    </div>

    <div class="nav-search-wrap">
      <span class="nav-si">🔍</span>
      <input class="inp inp-bg" type="text" id="gsearch" placeholder="Search people, posts..."
             oninput="handleSearch()" autocomplete="off">
      <div class="sdrop hidden" id="sdrop"></div>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab" id="tab-feed"    onclick="switchTab('feed')">🏠 Feed</button>
      <button class="nav-tab active" id="tab-explore" onclick="switchTab('explore')">🔥 Explore</button>
    </div>

    <div class="nav-right">
      <div class="icon-btn" onclick="goPage('notifications')" title="Notifications">
        🔔<div class="notif-dot hidden" id="notif-dot"></div>
      </div>
      <div id="nav-user-area"></div>
    </div>
  </div>
</nav>

<!-- ═══ APP ═══ -->
<div id="app">
  <div class="loader">Loading ConnectHub…</div>
</div>

<!-- ═══ MODAL ═══ -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeMod(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="modal-content"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG & STATE
// ═══════════════════════════════════════════════
const API = window.location.origin + "/api";
// Dev override: const API = "http://localhost:5002/api";

const S = {
  user:  null,
  token: localStorage.getItem("ch_token"),
  page:  "explore",
  args:  [],
  tab:   "explore",
};

// ═══════════════════════════════════════════════
//  API HELPER
// ═══════════════════════════════════════════════
async function api(method, path, body = null) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (S.token) opts.headers["Authorization"] = "Bearer " + S.token;
  if (body)    opts.body = JSON.stringify(body);
  const res  = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

// ═══════════════════════════════════════════════
//  ROUTING
// ═══════════════════════════════════════════════
function goPage(page, ...args) {
  S.page = page; S.args = args;
  window.scrollTo(0, 0);
  render();
}

function switchTab(tab) {
  S.tab = tab;
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  const el = document.getElementById("tab-" + tab);
  if (el) el.classList.add("active");
  goPage(tab);
}

async function render() {
  try {
    const page = S.page;
    if      (page === "feed")          await renderFeed();
    else if (page === "explore")       await renderExplore();
    else if (page === "profile")       await renderProfile(S.args[0]);
    else if (page === "post")          await renderPostDetail(S.args[0]);
    else if (page === "notifications") await renderNotifications();
    else if (page === "saved")         await renderSaved();
    else                               await renderExplore();
  } catch (e) {
    setApp(`<div class="loader">❌ ${e.message}<br>
      <small style="color:var(--muted)">Make sure backend is running: <strong>python app.py</strong> on port 5002</small></div>`);
  }
}

// ═══════════════════════════════════════════════
//  NAVBAR
// ═══════════════════════════════════════════════
function updateNavbar() {
  const el = ge("nav-user-area");
  if (S.user) {
    const av = S.user.name.charAt(0).toUpperCase();
    el.innerHTML = `
      <div class="flex ic g2" style="cursor:pointer" onclick="goPage('profile','${S.user.username}')">
        <div class="av" style="width:32px;height:32px;font-size:13px">${av}</div>
        <span class="sm semi truncate" style="max-width:80px">${S.user.name.split(" ")[0]}</span>
      </div>
      <button class="btn btn-gray btn-sm" onclick="doLogout()">Logout</button>`;
  } else {
    el.innerHTML = `<button class="btn btn-p btn-sm" onclick="openLoginModal()">Login / Sign Up</button>`;
  }
}

// ═══════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════
async function autoLogin() {
  if (!S.token) return;
  try {
    S.user = await api("GET", "/auth/me");
    updateNavbar();
    updateNotifDot();
  } catch (_) {
    S.token = null;
    localStorage.removeItem("ch_token");
  }
}

function openLoginModal() {
  openMod(`
  <div class="modal-head">
    <h3>Welcome to ConnectHub 📱</h3>
    <button class="modal-close" onclick="closeMod()">✕</button>
  </div>
  <div class="modal-body">
    <div class="auth-tabs">
      <div class="auth-tab active" id="at-l" onclick="swAuthTab('l')">Login</div>
      <div class="auth-tab" id="at-r" onclick="swAuthTab('r')">Sign Up</div>
    </div>
    <div id="merr"></div>

    <div id="lpanel">
      <div class="form-row"><label>Email or Username</label>
        <input class="inp" id="l-em" placeholder="Enter email or username" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="form-row"><label>Password</label>
        <input class="inp" id="l-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-p btn-fw" id="l-btn" onclick="doLogin()">Login →</button>
      <div style="background:var(--bg);border-radius:var(--rs);padding:12px;margin-top:12px;font-size:12px;line-height:1.9;color:var(--muted)">
        <strong style="color:var(--text)">Demo Accounts</strong><br>
        user@demo.com / Demo@123  →  @rahulmehta<br>
        priya@demo.com / Demo@123  →  @priyasharma<br>
        amit@demo.com / Demo@123  →  @amitverma
      </div>
    </div>

    <div id="rpanel" class="hidden">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-row"><label>Full Name *</label>
          <input class="inp" id="r-name" placeholder="Rahul Sharma">
        </div>
        <div class="form-row"><label>Username *</label>
          <input class="inp" id="r-user" placeholder="rahulsharma" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_.]/g,'')">
        </div>
      </div>
      <div class="form-row"><label>Email *</label>
        <input class="inp" id="r-email" type="email" placeholder="you@example.com">
      </div>
      <div class="form-row"><label>Password * (min 6 chars)</label>
        <input class="inp" id="r-pw" type="password" placeholder="Create a strong password">
      </div>
      <button class="btn btn-p btn-fw" id="r-btn" onclick="doRegister()">Create Account →</button>
    </div>
  </div>`);
}

function swAuthTab(t) {
  ge("lpanel").classList.toggle("hidden", t !== "l");
  ge("rpanel").classList.toggle("hidden", t !== "r");
  ge("at-l").classList.toggle("active", t === "l");
  ge("at-r").classList.toggle("active", t !== "l");
  ge("merr").innerHTML = "";
}

async function doLogin() {
  const em = v("l-em"), pw = v("l-pw");
  if (!em || !pw) { merr("Fill all fields"); return; }
  const btn = ge("l-btn"); bl(btn, true);
  try {
    const d = await api("POST", "/auth/login", { email: em, password: pw });
    onLogin(d);
  } catch (e) { merr(e.message); }
  finally { bl(btn, false, "Login →"); }
}

async function doRegister() {
  const name = v("r-name"), username = v("r-user"), email = v("r-email"), pw = v("r-pw");
  if (!name || !username || !email || !pw) { merr("Fill all fields"); return; }
  const btn = ge("r-btn"); bl(btn, true);
  try {
    const d = await api("POST", "/auth/register", { name, username, email, password: pw });
    onLogin(d);
  } catch (e) { merr(e.message); }
  finally { bl(btn, false, "Create Account →"); }
}

function onLogin(data) {
  S.token = data.token;
  S.user  = data.user;
  localStorage.setItem("ch_token", data.token);
  closeMod();
  updateNavbar();
  updateNotifDot();
  toast(`Welcome, ${data.user.name.split(" ")[0]}! 👋`, "success");
  switchTab("feed");
}

function doLogout() {
  S.token = null; S.user = null;
  localStorage.removeItem("ch_token");
  updateNavbar();
  switchTab("explore");
  toast("Logged out", "info");
}

function leftSidebar() {
  if (!S.user) return "<div></div>";
  const links = [
    ["feed",    "🏠", "Home"],
    ["explore", "🔥", "Explore"],
    ["profile_me", "👤", "My Profile"],
    ["saved",   "🔖", "Saved Posts"],
    ["notifications", "🔔", "Notifications"],
  ];
  return `<div class="left-sidebar">
    <div class="sidebar-card">
      <div class="sidebar-user" onclick="goPage('profile','${S.user.username}')">
        <div class="av" style="width:40px;height:40px;font-size:17px">${S.user.name.charAt(0)}</div>
        <div style="min-width:0">
          <div class="bold sm truncate">${S.user.name}</div>
          <div class="xs muted">@${S.user.username}</div>
        </div>
      </div>
      ${links.map(([pg, icon, label]) => {
        const target  = pg === "profile_me" ? S.user.username : "";
        const pageKey = pg === "profile_me" ? "profile" : pg;
        const active  = S.page === pageKey && (pageKey !== "profile" || S.args[0] === S.user.username);
        return `<button class="nav-link ${active ? "active" : ""}" onclick="goPage('${pageKey}','${target}')">
          <span class="nav-link-icon">${icon}</span>${label}
        </button>`;
      }).join("")}
    </div>
  </div>`;
}

function rightSidebar(trending) {
  const tags  = trending?.hashtags || [];
  const users = (trending?.users  || []).filter(u => u.id !== S.user?.id);
  return `<div class="right-sidebar">
    ${tags.length ? `<div class="trend-card">
      <div class="trend-title">🔥 Trending</div>
      ${tags.slice(0, 8).map(h => `
      <div class="trend-item" onclick="searchHashtag('${h.tag}')">
        <div class="htag">#${h.tag}</div>
        <div class="trend-count">${h.post_count} posts</div>
      </div>`).join("")}
    </div>` : ""}
    ${users.length ? `<div class="trend-card">
      <div class="trend-title">👥 People to Follow</div>
      ${users.slice(0, 5).map(u => `
      <div class="suggest-item">
        <div class="av" style="width:36px;height:36px;font-size:14px;flex-shrink:0;cursor:pointer" onclick="goPage('profile','${u.username}')">${u.name.charAt(0)}</div>
        <div style="flex:1;min-width:0;cursor:pointer" onclick="goPage('profile','${u.username}')">
          <div class="sm bold truncate">${u.name} ${u.is_verified ? '<span class="verified">✓</span>' : ""}</div>
          <div class="xs muted">@${u.username}</div>
        </div>
        ${S.user ? `<button class="btn btn-p btn-sm" onclick="doFollow(${u.id},this)">Follow</button>` : ""}
      </div>`).join("")}
    </div>` : ""}
  </div>`;
}

function createPostBox() {
  if (!S.user) return "";
  return `<div class="create-card">
    <div class="flex g3 ic">
      <div class="av" style="width:40px;height:40px;font-size:17px;flex-shrink:0">${S.user.name.charAt(0)}</div>
      <textarea class="create-input" id="post-text" rows="2"
        placeholder="What's on your mind, ${S.user.name.split(" ")[0]}?"
        onclick="expandCreate()" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    </div>
    <div id="post-img-preview"></div>
    <div class="create-actions hidden" id="post-actions">
      <div class="flex g2 ic">
        <button class="btn btn-gray btn-sm" onclick="toggleImgInput()">📷 Photo URL</button>
        <input class="inp inp-bg" type="text" id="post-img-url" placeholder="Paste image URL…"
               style="width:220px;font-size:13px;display:none"
               oninput="previewPostImg(this.value)">
      </div>

function expandCreate() {
  ge("post-actions")?.classList.remove("hidden");
}
function toggleImgInput() {
  const inp = ge("post-img-url");
  if (!inp) return;
  inp.style.display = inp.style.display === "none" ? "block" : "none";
  if (inp.style.display === "block") inp.focus();

function previewPostImg(url) {
  const wrap = ge("post-img-preview");
  if (!wrap) return;
  if (url.trim()) {
    wrap.innerHTML = `<div class="img-preview-wrap">
      <img src="${url}" onerror="this.closest('.img-preview-wrap').innerHTML='<p style=padding:10px;color:var(--muted);font-size:13px>Invalid image URL</p>'">
      <button class="remove-img" onclick="ge('post-img-url').value='';ge('post-img-preview').innerHTML=''">✕</button>
    </div>`;
  } else {
    wrap.innerHTML = "";

}

// ═══════════════════════════════════════════════
//  POST CARD
// ═══════════════════════════════════════════════
function postCard(p) {
  const body = (p.content || "").replace(
    /#(\w+)/g,
    `<span class="post-hashtag" onclick="searchHashtag('$1')">#$1</span>`
  );
  const liked = !!p.is_liked;
  const saved = !!p.is_saved;
  const isOwn = S.user && S.user.id == p.user_id;
  const avHtml = `<div class="av" style="width:40px;height:40px;font-size:17px" onclick="goPage('profile','${p.username}')">${p.name.charAt(0)}</div>`;

  return `<div class="post-card" id="pc-${p.id}">
    <div class="post-header">
      ${avHtml}
      <div class="post-meta">
        <div class="post-author" onclick="goPage('profile','${p.username}')">${p.name}${p.is_verified ? ' <span class="verified">✓</span>' : ''}</div>
        <div class="post-time muted xs">@${p.username} · ${tsince(p.created_at)}</div>
      </div>
      ${isOwn ? `<button style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:2px" title="Delete post" onclick="deletePost(${p.id})">🗑</button>` : ""}
    </div>
    <div class="post-body">${body}</div>
    ${p.image_url ? `<div class="post-img-wrap"><img class="post-img" src="${p.image_url}" alt="post image" onclick="goPage('post',${p.id})" onerror="this.closest('.post-img-wrap').remove()"></div>` : ""}
    <div class="post-stats">
      <span id="lc-${p.id}">${p.like_count || 0} ${p.like_count === 1 ? "like" : "likes"}</span>
      <span class="post-stat-link" onclick="goPage('post',${p.id})">${p.comment_count || 0} ${p.comment_count === 1 ? "comment" : "comments"}</span>
    </div>
    <div class="post-actions">
      <button class="pabtn ${liked ? "liked" : ""}" id="lb-${p.id}" onclick="doLike(${p.id},this)">
        ${liked ? "❤️" : "🤍"} Like
      </button>
      <button class="pabtn" onclick="goPage('post',${p.id})">
        💬 Comment
      </button>
      <button class="pabtn ${saved ? "saved" : ""}" id="sb-${p.id}" onclick="doSave(${p.id},this)">
        🔖 ${saved ? "Saved" : "Save"}
      </button>
    </div>
  </div>`;
}

async function submitPost() {
  const content   = (ge("post-text")?.value || "").trim();
  const image_url = (ge("post-img-url")?.value || "").trim();
  if (!content) { toast("Write something first!", "error"); return; }
  if (!S.user)  { openLoginModal(); return; }
  const btn = ge("submit-post-btn"); bl(btn, true);
  try {
    await api("POST", "/posts", { content, image_url });
    ge("post-text").value = "";
    ge("post-img-url") && (ge("post-img-url").value = "");
    ge("post-img-preview") && (ge("post-img-preview").innerHTML = "");
    ge("post-actions")?.classList.add("hidden");
    toast("Posted! 🎉", "success");
    render();
  } catch (e) { toast(e.message, "error"); }
  finally { bl(btn, false, "Post ↑"); }
}

// ═══════════════════════════════════════════════
//  ACTION HANDLERS
// ═══════════════════════════════════════════════
async function doLike(pid, btn) {
  if (!S.user) { openLoginModal(); return; }
  try {
    const r = await api("POST", `/posts/${pid}/like`);
    if (btn) {
      btn.classList.toggle("liked", r.liked);
      btn.innerHTML = `${r.liked ? "❤️" : "🤍"} Like`;
    }
    const lc = ge(`lc-${pid}`);
    if (lc) lc.textContent = `${r.like_count} ${r.like_count === 1 ? "like" : "likes"}`;
  } catch (e) { toast(e.message, "error"); }
}

async function doSave(pid, btn) {
  if (!S.user) { openLoginModal(); return; }
  try {
    const r = await api("POST", `/posts/${pid}/save`);
    if (btn) {
      btn.classList.toggle("saved", r.saved);
      btn.innerHTML = `🔖 ${r.saved ? "Saved" : "Save"}`;
    }
    toast(r.saved ? "Saved! 🔖" : "Removed from saved", "info");
  } catch (e) { toast(e.message, "error"); }
}

async function doFollow(uid, btn) {
  if (!S.user) { openLoginModal(); return; }
  try {
    const r = await api("POST", `/users/${uid}/follow`);
    if (btn) {
      btn.className = `btn ${r.following ? "btn-gray" : "btn-p"} btn-sm`;
      btn.textContent = r.following ? "Following" : "Follow";
    }
    toast(r.following ? "Following! 👥" : "Unfollowed", "info");
  } catch (e) { toast(e.message, "error"); }
}

async function deletePost(pid) {
  if (!confirm("Delete this post?")) return;
  try {
    await api("DELETE", `/posts/${pid}`);
    toast("Post deleted", "info");
    render();
  } catch (e) { toast(e.message, "error"); }
}

async function doComment(pid) {
  const content = v("cmt-inp");
  if (!content) { toast("Write a comment first", "error"); return; }
  try {
    const cm = await api("POST", `/posts/${pid}/comments`, { content });
    ge("cmt-inp").value = "";
    // Prepend the new comment
    const wrap = ge("comments-wrap");
    if (wrap) {
      const empty = wrap.querySelector(".empty-state");
      if (empty) empty.remove();
      wrap.insertAdjacentHTML("afterbegin", commentRow(cm, pid));
    }
    // Update comment count badge in header
    const hdr = document.querySelector(`#pc-${pid} .post-stat-link`);
    if (hdr) {
      const cc = parseInt(hdr.textContent) + 1;
      hdr.textContent = `${cc} ${cc === 1 ? "comment" : "comments"}`;
    }
    toast("Comment added! 💬", "success");
  } catch (e) { toast(e.message, "error"); }
}

async function doDeleteComment(cid, pid) {
  if (!confirm("Delete this comment?")) return;
  try {
    await api("DELETE", `/comments/${cid}`);
    ge(`cmr-${cid}`)?.remove();
    toast("Comment deleted", "info");
  } catch (e) { toast(e.message, "error"); }
}

// ═══════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════
let _searchTimer;
async function handleSearch() {
  const q = ge("gsearch")?.value?.trim() || "";
  clearTimeout(_searchTimer);
  const dd = ge("sdrop");
  if (!dd) return;
  if (q.length < 2) { dd.classList.add("hidden"); return; }
  _searchTimer = setTimeout(async () => {
    try {
      const data = await api("GET", `/search?q=${encodeURIComponent(q)}`);
      if (!data.users.length && !data.posts.length) { dd.classList.add("hidden"); return; }
      dd.innerHTML = [
        ...data.users.map(u => `
          <div class="sitem" onclick="goPage('profile','${u.username}');ge('sdrop').classList.add('hidden');ge('gsearch').value=''">
            <div class="av" style="width:30px;height:30px;font-size:12px;flex-shrink:0">${u.name.charAt(0)}</div>
            <div>
              <div class="sm bold">${u.name} ${u.is_verified ? "✓" : ""}</div>
              <div class="xs muted">@${u.username} · ${u.follower_count} followers</div>
            </div>
          </div>`),
        ...data.posts.map(p => `
          <div class="sitem" onclick="goPage('post',${p.id});ge('sdrop').classList.add('hidden');ge('gsearch').value=''">
            <span style="font-size:16px">📝</span>
            <span class="sm">${p.content.slice(0, 60)}…</span>
          </div>`),
      ].join("");
      dd.classList.remove("hidden");
    } catch (_) {}
  }, 350);
}
document.addEventListener("click", e => {
  if (!e.target.closest(".nav-search-wrap")) ge("sdrop")?.classList.add("hidden");
});

function searchHashtag(tag) {
  const inp = ge("gsearch");
  if (inp) { inp.value = "#" + tag; handleSearch(); }
}

// ═══════════════════════════════════════════════
//  FOLLOWERS MODAL
// ═══════════════════════════════════════════════
async function showFollowers(uid, type) {
  try {
    const rows = await api("GET", `/users/${uid}/${type}`);
    openMod(`
    <div class="modal-head">
      <h3>${type === "followers" ? "Followers" : "Following"} (${rows.length})</h3>
      <button class="modal-close" onclick="closeMod()">✕</button>
    </div>
    <div class="modal-body" style="padding:12px 18px">
      ${!rows.length
        ? `<p class="muted sm center" style="padding:24px">No ${type} yet</p>`
        : rows.map(u => `
        <div class="suggest-item">
          <div class="av" style="width:38px;height:38px;font-size:15px;flex-shrink:0;cursor:pointer" onclick="closeMod();goPage('profile','${u.username}')">${u.name.charAt(0)}</div>
          <div style="flex:1;min-width:0;cursor:pointer" onclick="closeMod();goPage('profile','${u.username}')">
            <div class="sm bold truncate">${u.name} ${u.is_verified ? `<span class="verified">✓</span>` : ""}</div>
            <div class="xs muted">@${u.username}</div>
          </div>
          ${S.user && S.user.id !== u.id
            ? `<button class="btn ${u.is_following ? "btn-gray" : "btn-p"} btn-sm" onclick="doFollow(${u.id},this)">${u.is_following ? "Following" : "Follow"}</button>`
            : ""}
        </div>`).join("")}
    </div>`);
  } catch (e) { toast(e.message, "error"); }
}

// ═══════════════════════════════════════════════
//  NOTIF DOT POLLING
// ═══════════════════════════════════════════════
async function updateNotifDot() {
  if (!S.user || !S.token) return;
  try {
    const u = await api("GET", "/auth/me");
    S.user = u;
    const dot = ge("notif-dot");
    if (dot) dot.classList.toggle("hidden", (u.unread_notifications || 0) === 0);
  } catch (_) {}
}

// ═══════════════════════════════════════════════
//  MODAL HELPERS
// ═══════════════════════════════════════════════
function openMod(html) {
  ge("modal-content").innerHTML = html;
  ge("modal-overlay").classList.remove("hidden");
}
function closeMod(e) {
  if (!e || e.target === ge("modal-overlay"))
    ge("modal-overlay").classList.add("hidden");
}

// ═══════════════════════════════════════════════
//  SMALL HELPERS
// ═══════════════════════════════════════════════
const ge = id => document.getElementById(id);
const v  = id => (ge(id)?.value || "").trim();

function setApp(html) {
  const app = ge("app");
  if (app) app.innerHTML = html;
}

function toast(msg, type = "info") {
  const t = ge("toast");
  t.textContent = msg;
  t.className   = `show ${type}`;
  clearTimeout(window._tt);
  window._tt = setTimeout(() => { t.className = ""; }, 3200);
}

function merr(msg) {
  const el = ge("merr");
  if (el) el.innerHTML = `<div class="err-box">⚠️ ${msg}</div>`;
}

function bl(btn, loading, text = "") {
  if (!btn) return;
  btn.disabled = loading;
  if (loading)    btn.innerHTML = `<div class="spin"></div>`;
  else if (text)  btn.innerHTML = text;
}

function tsince(ts) {
  if (!ts) return "";
  try {
    const str  = ts.includes("T") ? ts + (ts.endsWith("Z") ? "" : "Z") : ts.replace(" ", "T") + "Z";
    const diff = (Date.now() - new Date(str).getTime()) / 1000;
    if (diff < 60)     return "just now";
    if (diff < 3600)   return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400)  return `${Math.floor(diff / 3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
    return new Date(str).toLocaleDateString("en-IN");
  } catch (_) { return ts; }
}
